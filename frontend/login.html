<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoFlow Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>

<div class="container">

    <div class="left">

        <div class="circle one"></div>
        <div class="circle two"></div>
        <div class="circle three"></div>

        <div class="left-content">

            <div class="logo-icons">
                <!--<img src="truck-icon.png">-->
                <!--<img src="box-icon.png">-->
            </div>

            <h1 style="padding-top: 250px;">CargoFlow</h1>

            <p style="padding-bottom: 250px;">
                The smartest way to transport your cargo across the country
            </p>

        </div>

    </div>

    <div class="right">

        <div class="form-box">

            <h2>Welcome back</h2>

            <p class="subtitle">
                Sign in to manage your shipments
            </p>

            <form id="loginForm">

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="forgot">
                    <a href="#">Forgot password?</a>
                </div>

                <p id="errorMsg" style="color:red; display:none;"></p>

                <button type="submit" class="signin-btn">
                    Sign In
                </button>

                <button type="button" class="google-btn">
                    Continue with Google
                </button>

            </form>

            <p class="signup">
                Don't have an account?
                <a href="register.html">Sign up</a>
            </p>

        </div>

    </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
