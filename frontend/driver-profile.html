<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Profile</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/driver-dashboard.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/add-vehicle.css">
</head>
<!-- driver-dashboard.css is reused here for .add-vehicle-btn and .empty-card styles -->

<body>

    <!-- Navbar -->
    <header class="navbar">

        <div class="navbar-left">

            <div class="navbar-logo">
                <!--<img src="icons/truck.svg" alt="CargoFlow">-->
            </div>

            <h2>CargoFlow <span>· Driver</span></h2>

        </div>

        <div class="navbar-right">

            <button class="logout-action-btn" id="logoutBtn">
                Logout
            </button>

        </div>

    </header>

    <!-- Profile -->
    <main class="container">

        <div class="profile-wrap">

            <div class="back-link">
                <a href="driver-dashboard.html">← Back to Dashboard</a>
            </div>

            <p id="profileMsg"></p>

            <section class="profile-card card">

                <div class="profile-top">

                    <div class="profile-identity">

                        <div class="profile-avatar" id="avatarInitial">D</div>

                        <div>
                            <h1 id="profileName">Loading...</h1>
                            <p id="profileEmail"></p>
                        </div>

                    </div>

                    <div class="profile-buttons">

                        <button class="edit-btn" id="editBtn">Edit Profile</button>

                        <button class="cancel-btn" id="cancelBtn" style="display:none;">Cancel</button>
                        <button class="save-btn" id="saveBtn" style="display:none;">Save Changes</button>

                    </div>

                </div>

                <form id="profileForm">

                    <div class="form-group" style="margin-bottom:18px;">
                        <label for="fullName">Full Name <span>*</span></label>
                        <input type="text" id="fullName" name="fullName" readonly>
                    </div>

                    <div class="form-row" style="margin-bottom:18px;">

                        <div class="form-group">
                            <label for="phone">Phone <span>*</span></label>
                            <input type="tel" id="phone" name="phone" readonly>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" readonly>
                        </div>

                    </div>

                    <div class="form-row" style="margin-bottom:18px;">

                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" readonly>
                        </div>

                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" disabled>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                    </div>

                    <div class="form-row" style="margin-bottom:18px;">

                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" readonly>
                        </div>

                        <div class="form-group">
                            <label for="street">Street</label>
                            <input type="text" id="street" name="street" readonly>
                        </div>

                    </div>

                    <div class="form-row" style="margin-bottom:18px;">

                        <div class="form-group">
                            <label for="alley">Alley</label>
                            <input type="text" id="alley" name="alley" readonly>
                        </div>

                        <div class="form-group">
                            <label for="houseNumber">House Number</label>
                            <input type="text" id="houseNumber" name="houseNumber" readonly>
                        </div>

                    </div>

                    <div class="form-row" style="margin-bottom:18px;">

                        <div class="form-group">
                            <label for="birthDate">Birth Date</label>
                            <input type="date" id="birthDate" name="birthDate" readonly>
                        </div>

                        <div class="form-group">
                            <label for="workExperience">Work Experience (years)</label>
                            <input type="number" id="workExperience" name="workExperience" min="0" readonly>
                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">
                            <label for="licenseNumber">License Number</label>
                            <input type="text" id="licenseNumber" name="licenseNumber" readonly>
                        </div>

                        <div class="form-group">
                            <label for="disease">Disease / Medical Condition</label>
                            <input type="text" id="disease" name="disease" readonly>
                        </div>

                    </div>

                </form>

            </section>

            <!-- Vehicle -->
            <section class="profile-card card">

                <div class="profile-top">

                    <h1 style="font-size:var(--fs-heading);">My Vehicle</h1>

                    <div class="profile-buttons">

                        <button class="edit-btn" id="editVehicleBtn">Edit Vehicle</button>

                        <button class="cancel-btn" id="cancelVehicleBtn" style="display:none;">Cancel</button>
                        <button class="save-btn" id="saveVehicleBtn" style="display:none;">Save Changes</button>

                    </div>

                </div>

                <p id="vehicleMsg"></p>

                <form id="vehicleForm">

                    <div class="form-group" style="margin-bottom:18px;">
                        <label for="vehicleType">Vehicle Type <span>*</span></label>
                        <select id="vehicleType" name="vehicleType" disabled>
                            <option value="truck">Truck</option>
                            <option value="khavar">khavar</option>
                            <option value="pickup">Pickup</option>
                            <option value="trailer">Trailer</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom:18px;">
                        <label for="plateNumber">Plate Number <span>*</span></label>
                        <input type="text" id="plateNumber" name="plateNumber" readonly>
                    </div>

                    <div class="form-row three-column" style="margin-bottom:18px;">

                        <div class="form-group">
                            <label for="vehicleLength">Length (m)</label>
                            <input type="number" id="vehicleLength" name="vehicleLength" readonly>
                        </div>

                        <div class="form-group">
                            <label for="vehicleWidth">Width (m)</label>
                            <input type="number" id="vehicleWidth" name="vehicleWidth" readonly>
                        </div>

                        <div class="form-group">
                            <label for="vehicleHeight">Height (m)</label>
                            <input type="number" id="vehicleHeight" name="vehicleHeight" readonly>
                        </div>

                    </div>

                    <div class="switch-card" style="margin-bottom:18px;">
                        <span>Has Refrigerator</span>
                        <label class="switch">
                            <input type="checkbox" id="vehicleRefrigerator" disabled>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="vehicleDepreciation">Depreciation (%)</label>
                        <input type="number" id="vehicleDepreciation" name="vehicleDepreciation" readonly>
                    </div>

                </form>

                <div class="empty-card" id="noVehicleMsg" style="display:none; margin-top:18px;">
                    <p>You have no vehicle registered yet.</p>
                    <button class="btn-primary add-vehicle-btn" style="margin-top:12px;">
                        <a href="add-vehicle.html" style="color:white;">Add Vehicle</a>
                    </button>
                </div>

            </section>

        </div>

    </main>

    <script src="js/driver-profile.js"></script>
</body>
</html>
