<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delivery Details</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/new-request.css">

</head>

<body>

    <div class="container" style="margin-top: 100px; margin-bottom: 50px;">

        <div class="request-form">

            <h1 class="page-title">

                New Shipment Request

            </h1>

            <div class="progress-bar">

                <div class="progress active"></div>

                <div class="progress active"></div>

            </div>

            <div class="section-title">

                <!--<img src="icons/truck.svg">-->

                <h2>Delivery Details</h2>

            </div>

            <form id="step2Form">

                <div class="form-row">

                    <div class="form-group">
                        <label>Origin Latitude <span>*</span></label>
                        <input type="number" step="any" id="originLat" placeholder="e.g. 35.6892">
                    </div>

                    <div class="form-group">
                        <label>Origin Longitude <span>*</span></label>
                        <input type="number" step="any" id="originLng" placeholder="e.g. 51.3890">
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">
                        <label>Destination Latitude <span>*</span></label>
                        <input type="number" step="any" id="destLat" placeholder="e.g. 32.6546">
                    </div>

                    <div class="form-group">
                        <label>Destination Longitude <span>*</span></label>
                        <input type="number" step="any" id="destLng" placeholder="e.g. 51.6680">
                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label>

                            Loading Date/Time

                        </label>

                        <input type="datetime-local" id="loadingDatetime">

                    </div>

                    <div class="form-group">

                        <label>

                            Delivery Date/Time

                        </label>

                        <input type="datetime-local" id="deliveryDatetime">

                    </div>

                </div>

            <div class="form-group">

            <label>

            Receiver Name <span>*</span>

            </label>

            <input type="text" id="receiverName">

            </div>

            <div class="form-group">

            <label>

            Receiver Phone <span>*</span>

            </label>

            <input type="tel" id="receiverPhone">

            </div>

            <div class="price-card">

                <p>

                Estimated Price

                </p>

                <h2 id="estimatedPrice">

                -

                </h2>

                <button type="button" id="calcPriceBtn" class="btn-outline" style="margin-top:10px;">
                    Calculate Total Price
                </button>

            </div>

            <p id="errorMsg" style="color:red; display:none;"></p>

            <div class="action-buttons">

            <button
            type="button"
            class="btn-outline"
            onclick="window.location.href='new-request-step1.html'">

            Back

            </button>

            <button
            type="submit"
            class="btn-primary">

            Submit Request

            </button>

            </div>

            </form>

        </div>

    </div>

<script src="js/new-request-step2.js"></script>
</body>

</html>
