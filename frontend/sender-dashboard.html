<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sender Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/senderdashboard.css">
</head>
<script src="js/sender-dashboard.js"></script>
<body>

    <!-- Navbar -->
    <header class="navbar">

        <div class="navbar-left">

            <div class="navbar-logo">
                <!--<img src="icons/truck.svg" alt="CargoFlow">-->
            </div>

            <h2>CargoFlow <span>· Sender</span></h2>

        </div>

        <div class="navbar-right">

            <button class="logout-btn">
                <!--<img src="icons/logout.svg" alt="Logout">-->
            </button>

        </div>

    </header>

    <!-- Main Content -->
    <main class="container">

        <section class="dashboard">

            <!-- Header -->
            <div class="dashboard-header">

                <div>

                    <h1 id="welcomeName">Hello,</h1>
                    <p id="userCity">Isfahan</p>

                </div>

                <button class="new-request-btn">

                    <!--<img src="icons/plus.svg" alt="">-->
                    <a href="new-request-step1.html" style="color: white;">New Request</a>
                </button>

            </div>

            <!-- Statistics -->
            <div class="stats">

                <div class="stat-card">

                    <h2>0</h2>

                    <p>Active Shipments</p>

                </div>

                <div class="stat-card">

                    <h2>0</h2>

                    <p>Delivered</p>

                </div>

            </div>

            <!-- Requests -->
            <section class="recent-requests">

                <h2>Recent Requests</h2>

                <div class="empty-card" id="requestsContainer">

                    <!--<img src="icons/package.svg" alt="Package">-->

                    <p>No requests yet</p>

                    <button class="create-btn" onclick="window.location.href='new-request-step1.html'">

                        Create First Request

                    </button>

                </div>

            </section>

        </section>

    </main>

</body>
</html>
