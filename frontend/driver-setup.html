<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Profile</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/driversetup.css">
</head>
<body>

<div class="container">

    <div class="driver-profile" style="margin-top: 40px; margin-bottom: 20px;">

        <!-- Back -->
        <div class="back-link">
            <a href="choose-your-role.html">
                ← Back
            </a>
        </div>

        <!-- Header -->
        <div class="profile-header">

            <div class="logo-box">
                <!--<img src="truck-icon.png" alt="Driver">-->
            </div>

            <div class="header-text">
                <h1>Driver Profile</h1>
                <p>Set up your driver account</p>
            </div>

        </div>

        <!-- Form -->
        <form id="driverSetupForm">

            <!-- Full Name -->
            <div class="form-group">
                <label for="fullname">
                    Full Name <span>*</span>
                </label>

                <input
                    type="text"
                    id="fullname"
                    name="fullname">
            </div>

            <!-- Phone & Username -->
            <div class="form-row">

                <div class="form-group">
                    <label for="phone">
                        Phone <span>*</span>
                    </label>

                    <input
                        type="tel"
                        id="phone"
                        name="phone">
                </div>

                <div class="form-group">
                    <label for="username">
                        Username <span>*</span>
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username">
                </div>

            </div>

            <!-- Gender -->
            <div class="form-group">
                <label for="gender">
                    Gender <span>*</span>
                </label>

                <select id="gender" name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- City & Street -->
            <div class="form-row">

                <div class="form-group">
                    <label for="city">City</label>

                    <input
                        type="text"
                        id="city"
                        name="city">
                </div>

                <div class="form-group">
                    <label for="street">Street</label>

                    <input
                        type="text"
                        id="street"
                        name="street">
                </div>

            </div>

            <!-- Alley & House Number -->
            <div class="form-row">

                <div class="form-group">
                    <label for="alley">Alley</label>

                    <input
                        type="text"
                        id="alley"
                        name="alley">
                </div>

                <div class="form-group">
                    <label for="house-number">House Number</label>

                    <input
                        type="text"
                        id="house-number"
                        name="house-number">
                </div>

            </div>

            <!-- Birth Date & Experience -->
            <div class="form-row">

                <div class="form-group">
                    <label for="birthdate">
                        Birth Date
                    </label>

                    <input
                        type="date"
                        id="birthdate"
                        name="birthdate">
                </div>

                <div class="form-group">
                    <label for="experience">
                        Work Experience (years)
                    </label>

                    <input
                        type="number"
                        id="experience"
                        name="experience"
                        min="0">
                </div>

            </div>

            <!-- License & Disease -->
            <div class="form-row">

                <div class="form-group">
                    <label for="license">
                        License Number
                    </label>

                    <input
                        type="text"
                        id="license"
                        name="license">
                </div>

                <div class="form-group">
                    <label for="disease">
                        Disease / Medical Condition
                    </label>

                    <input
                        type="text"
                        id="disease"
                        name="disease">
                </div>

            </div>

            <!-- Company -->
            <div class="form-group">
                <label for="company">
                    Company (optional)
                </label>

                <select
                    id="company"
                    name="company">

                    <option value="">
                        No company
                    </option>

                    <option value="company1">
                        Company 1
                    </option>

                    <option value="company2">
                        Company 2
                    </option>

                </select>
            </div>

            <!-- Submit -->
            <p id="errorMsg" style="color:red; display:none;"></p>

            <button
                type="submit"
                class="submit-btn">

                Create Driver Account

            </button>

        </form>

    </div>

</div>

<script src="js/driver-setup.js"></script>
</body>
</html>
